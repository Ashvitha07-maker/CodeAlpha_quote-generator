<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="quote-box">
            <h1>✨ Quote of the Moment ✨</h1>
            
            <div class="quote-content">
                <p id="quoteText" class="quote-text">Click the button to see a quote</p>
                <p id="quoteAuthor" class="quote-author">- Unknown</p>
            </div>
            
            <button id="newQuoteBtn" class="new-quote-btn">New Quote</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
